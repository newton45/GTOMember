<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <link rel="stylesheet" href="css/variables.css">
    
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    
    <link rel="stylesheet" href="css/page-members.css">
    <link rel="stylesheet" href="css/page-activities.css">
    <link rel="stylesheet" href="css/page-seats.css">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTO成员管理系统</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="app-header">
        <div class="header-title-group">
            <h1>GTO管理系统</h1>
            <div class="app-tagline">------------------ Kingshot 494[GTO] 猛凶人星外</div>
        </div>
        <div class="data-controls">
                <button id="btn-cloud-upload" class="btn" style="background: #8c8c8c; color: #ffffff; border: 1px solid #ffffff;">↑↑↑ 上传设置</button>
                <button id="btn-cloud-download" class="btn" style="background: #8c8c8c; color: #ffffff; border: 1px solid #ffffff;">↓↓↓ 下载设置</button>
                <button id="btn-clear-all" class="btn btn-primary">全部清空</button>
                
                <button id="btn-export" class="btn btn-primary">导出本地</button>
                <button id="btn-import" class="btn btn-primary">导入本地</button>
                
                <input type="file" id="file-import" accept=".json" hidden>
            </div>
            
        </header>

        <nav class="app-nav">
            <div class="nav-item">
                <button class="nav-btn active" data-page="members">成员管理</button>
                <div class="nav-clear-btn" data-target="members" title="清空该页数据">&times;</div>
            </div>
            
            <div class="nav-item">
                <button class="nav-btn" data-page="activities">活动管理</button>
                <div class="nav-clear-btn" data-target="activities" title="清空该页数据">&times;</div>
            </div>

            <button class="nav-btn" data-target="page-seats">座位管理</button>

        </nav>

        <main class="app-main">
            <div id="page-members" class="page active">
                <div class="page-toolbar">
                    <div class="toolbar-left">
                        <button id="btn-batch-add-tiny" class="btn btn-primary" title="批量新增成员 (昵称+ID)">+++</button>
                    </div>
                    <div class="search-box">
                        <input type="text" id="search-member" placeholder="搜索成员... ( 拼音首字母 / 局部昵称 / ID / 曾用名 / 职级 )" style="min-width: 380px;">
                    </div>
                    </div>
                <div class="members-grid" id="members-grid"></div>
            </div>

            <div id="page-activities" class="page">
                <div class="placeholder">
                    <p>活动管理功能开发中...</p>
                </div>
            </div>

            <div id="page-seats" class="page"></div>

        </main>

        <div id="modal-container" class="modal-container hidden"></div>
    </div>

    <script src="config/constants.js"></script>
    <script src="core/storage.js"></script>
    <script src="core/importExport.js"></script>
    <script src="core/cloudSync.js"></script>

    <script src="data/member.js"></script>
    <script src="data/activity.js"></script>
    <script src="data/memberManager.js"></script>
    <script src="data/activityManager.js"></script> 
    <script src="data/dataManager.js"></script>

    <script src="ui/memberModal.js"></script>
    <script src="ui/batchAddModal.js"></script>
    <script src="ui/rankAdjustModal.js"></script>
    <script src="ui/powerAdjustModal.js"></script>
    <script src="ui/components/createActivityModal.js"></script> 
    <script src="ui/components/memberSelectorModal.js"></script>
    <script src="ui/components/memberMarkerModal.js"></script>
    <script src="ui/components/renameActivityModal.js"></script>
    <script src="ui/components/teamAllocationModal.js"></script>
    <script src="ui/components/clearHistoryModal.js"></script>
    <script src="ui/components/battleResultModal.js"></script>
    <script src="ui/components/seatSelectorModal.js"></script>
    <script src="ui/components/levelSelectorModal.js"></script> 
    <script src="ui/components/syncModal.js"></script>

    <script src="ui/memberRenderer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pinyin-match/dist/main.js"></script>
    
    <script src="ui/pages/membersPage.js"></script>
    <script src="ui/pages/activitiesPage.js"></script>
    <script src="ui/pages/seatPage.js"></script>

    <script src="app.js"></script>
</body>
</html>
